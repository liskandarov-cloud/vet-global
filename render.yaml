# Render Blueprint — one-click backend + managed Postgres.
# Render dashboard → New → Blueprint → connect this repo → Apply.
# Render injects PORT automatically (the app reads process.env.PORT); no manual
# port/root-directory config. The root Dockerfile builds the backend.
databases:
  - name: vetglobal-db
    databaseName: vetglobal
    user: vetglobal
    plan: free

services:
  - type: web
    name: vetglobal-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vetglobal-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: PLATFORM_COMMISSION_PERCENT
        value: "12"
      - key: VETPOINTS_EARN_PERCENT
        value: "1"
      - key: VETPOINTS_MAX_SPEND_PERCENT
        value: "10"
      - key: PAYMENTS_MODE
        value: mock
      - key: DIDOX_MODE
        value: mock
      - key: ADMIN_EMAIL
        value: admin@vetglobal.com
      - key: ADMIN_PASSWORD
        value: admin123
      - key: CORS_ORIGINS
        value: "*"
